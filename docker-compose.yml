services:
  db:
    image: postgres:16-alpine
    container_name: lab_db
    restart: always
    environment:
      POSTGRES_DB: cruddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cruddb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: lab_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: lab_frontend
    restart: always
    depends_on:
      - api
    ports:
      - "8088:80"

volumes:
  postgres_data: